name: Docs book

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for missing pages in SUMMARY.md
        working-directory: ./docs
        run: ./verify_summary.sh

      # Lets mise install the cargo-backed tools (mdbook-toc, mdbook-mermaid)
      # from prebuilt binaries instead of compiling them
      - name: Install cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Install mdbook and preprocessors
        uses: jdx/mise-action@v2

      - name: Build
        run: mise run docs-build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        # Only deploy if pushed to the main branch
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book
          # Don't store history of gh-pages branch
          # This ensures that the repository size doesn't grow too much
          force_orphan: true
